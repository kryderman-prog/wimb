<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to WIMB with Google to continue">
    <title>WIMB - Login</title>
    <!-- config and Google Identity Services -->
    <script src="js/config.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <main class="container text-center">
        <h1 class="title">Sign In</h1>
        <p class="subtitle fade">Welcome back to WIMB....</p>

        <div class="google-btn-wrapper">
            <div id="g_id_onload"
                 data-client_id="1072668313654-5qbvq5gmhku2t69vbajsf189659a421g.apps.googleusercontent.com"
                 data-callback="handleCredentialResponse"
                 data-ux_mode="popup">
            </div>

            <div class="g_id_signin"
                 data-type="standard"
                 data-size="large"
                 data-theme="outline">
            </div>
        </div>

        <div style="margin-top: 2rem;">
            <p style="margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem;">— OR —</p>
            <button id="devLogin" class="btn btn-outline">Developer Test Login</button>
        </div>
    </main>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- App Logic -->
    <script src="js/app.js"></script>
    <!-- Login logic (depends on config and GSI) -->
    <script src="js/login.js"></script>
</body>

</html>
